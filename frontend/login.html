<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SkyGuard AI</title>
    <link rel="icon" type="image/png" href="images/logo.png" />
    <link rel="stylesheet" href="auth-styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 style="display: flex; align-items: center; justify-content: center; gap: 12px;"><img src="images/logo.png" alt="SkyGuard AI" style="width: 40px; height: 40px; object-fit: contain;"> SkyGuard AI</h1>
                <p>Intelligent Flight Risk Assessment</p>
            </div>
            
            <form id="login-form" class="auth-form">
                <h2>Welcome Back</h2>
                
                <div class="form-group">
                    <label for="email">Email or Username</label>
                    <input type="text" id="email" name="email" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                
                <div id="error-message" class="error-message"></div>
                
                <button type="submit" class="btn-primary" id="login-btn">
                    <span class="btn-text">Login</span>
                    <span class="btn-loader" style="display: none;">
                        <span class="spinner"></span> Logging in...
                    </span>
                </button>
                
                <div class="auth-footer">
                    <p>Don't have an account? <a href="signup.html">Sign up</a></p>
                </div>
            </form>
        </div>
    </div>
    
    <script src="auth.js"></script>
</body>
</html>
